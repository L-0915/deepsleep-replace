# DeepSleep SFT (Supervised Fine-Tuning) Configuration
# Usage: bash scripts/run/run_sft.sh
#        or: python trainer/train_sft.py --config configs/sft.yaml

# ==================== Model ====================
model:
  hidden_size: 768
  num_hidden_layers: 8
  num_heads: 8
  num_kv_heads: 4
  head_dim: 96
  vocab_size: 7200
  max_seq_len: 3072

  # MoE
  use_moe: true
  num_experts: 8
  num_shared_experts: 0
  num_experts_per_tok: 2

# ==================== Data ====================
data:
  data_path: data/sft/xiaoxi/xiaoxi_sft.jsonl
  tokenizer_path: checkpoints/tokenizer
  from_weight: out/cpt/final/model.pth         # CPT checkpoint (.pth file)

# ==================== Training ====================
training:
  save_dir: out/sft
  save_weight: sft
  epochs: 5
  batch_size: 8
  learning_rate: 5.0e-6         # 需要足够大的lr让模型跳出CPT的局部最优
  device: cuda:0
  dtype: bfloat16
  num_workers: 0
  accumulation_steps: 4         # effective batch = 32
  grad_clip: 1.0
  log_interval: 20
  save_interval: 200

  # Resume
  from_resume: false

  # Logging
  use_wandb: false
  wandb_project: DeepSleep-SFT

# ==================== Notes ====================
# SFT 数据: 10,000 条 (6类别), batch=96
#   每epoch: 10000/96 ≈ 104 steps
#   3 epochs: ~312 steps total, 几分钟可完成
