# DeepSleep DPO (Direct Preference Optimization) Configuration
# Usage: bash scripts/run/run_dpo.sh
#        or: python trainer/train_dpo.py --config configs/dpo.yaml

# ==================== Model ====================
model:
  hidden_size: 768
  num_hidden_layers: 8
  num_heads: 8
  num_kv_heads: 4
  head_dim: 96
  vocab_size: 7200
  max_seq_len: 3072

  # MoE
  use_moe: true
  num_experts: 8
  num_shared_experts: 0
  num_experts_per_tok: 2

# ==================== Data ====================
data:
  data_path: data/dpo/xiaoxi_dpo.jsonl
  tokenizer_path: checkpoints/tokenizer
  sft_checkpoint: out/sft/final_model.pth   # SFT checkpoint (used for both policy & reference)

# ==================== Training ====================
training:
  save_dir: out/dpo
  save_weight: dpo
  epochs: 1                       # DPO usually 1 epoch
  batch_size: 4                   # small batch (2 forward passes per step)
  learning_rate: 5.0e-7           # very low LR for alignment
  dpo_beta: 0.1                   # DPO loss coefficient
  device: cuda:0
  dtype: bfloat16
  num_workers: 4
  accumulation_steps: 4
  grad_clip: 1.0
  log_interval: 50
  save_interval: 200

  # Resume
  from_resume: false

  # Logging
  use_wandb: false
  wandb_project: DeepSleep-DPO
