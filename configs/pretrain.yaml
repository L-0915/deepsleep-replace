# DeepSleep Pretrain Configuration
# Usage: bash scripts/run/run_pretrain.sh
#        or: python trainer/train_pretrain.py --config configs/pretrain.yaml

# ==================== Model ====================
model:
  hidden_size: 768          # d_model
  num_hidden_layers: 8      # transformer layers
  num_heads: 8              # query heads (GQA)
  num_kv_heads: 4           # key-value heads (GQA)
  head_dim: 96              # attention head dimension
  vocab_size: 7200          # BPE vocab size
  max_seq_len: 2048         # max sequence length

  # MoE
  use_moe: true
  num_experts: 8            # total experts per layer
  num_shared_experts: 0     # always-active shared experts
  num_experts_per_tok: 2    # top_k experts per token

# ==================== Data ====================
data:
  tokenizer_path: checkpoints/tokenizer
  # bilingual: true (default) — interleaves SkyPile-150B (zh 70%) + OpenWebText (en 30%)
  # dataset_name is not set, so bilingual mode is auto-enabled
  zh_ratio: 0.5              # Chinese vs English ratio (50/50)
  max_eval_samples: 10000    # held-out eval samples
  min_text_length: 50        # skip docs shorter than this
  pack_sequences: true       # pack multiple docs per seq (zero padding, full Flash Attn)

# ==================== Training ====================
training:
  output_dir: out/pretrain
  max_steps: 13000
  per_device_train_batch_size: 96
  per_device_eval_batch_size: 96
  gradient_accumulation_steps: 4   # effective batch = 384
  gradient_checkpointing: false
  tf32: true                       # Ampere+ matmul acceleration

  # Tokens budget:
  #   384 * 2048 * 15260 = ~12.0B tokens
  #   ~60x total params (199M) / ~186x active params (64.5M)

  # Optimizer (AdamW, LLaMA-style betas)
  optim: adamw_torch_fused          # fused CUDA kernels, faster than adamw_torch
  learning_rate: 3.75e-4
  weight_decay: 0.1                 # HF Trainer auto-excludes bias & norm params
  adam_beta1: 0.9                   # LLaMA/GPT standard
  adam_beta2: 0.95                  # NOT 0.999 — slower decay is better for pretrain
  adam_epsilon: 1.0e-8
  warmup_steps: 260                 # ~2% of total steps
  lr_scheduler_type: cosine
  max_grad_norm: 1.0

  # Precision
  bf16: true

  # Eval & Save
  eval_steps: 500
  save_steps: 500
  save_total_limit: 5
  logging_steps: 50

  # Resume
  # resume_from_checkpoint: out/pretrain/checkpoint-10000

# ==================== Logging ====================
logging:
  report_to: tensorboard           # tensorboard, wandb, or comma-separated
  # wandb_project: DeepSleep-Pretrain
  # run_name: pretrain-d768-moe

# ==================== Generation ====================
generation:
  # Comma-separated prompts for periodic sample generation
  prompts: "睡眠是,研究表明，,Sleep is,The most common sleep"
  max_new_tokens: 100
